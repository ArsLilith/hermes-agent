services:
  warroom:
    build: .
    image: hermes-agent
    container_name: hermes-warroom
    restart: unless-stopped
    volumes:
      - '~/.hermes:/opt/data'
      - 'hermes_backups:/backups'
    environment:
      - 'HERMES_UID=${HERMES_UID:-0}'
      - 'HERMES_GID=${HERMES_GID:-0}'
      - 'HERMES_HOME=/opt/data'
      - 'OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}'
      - 'GEMINI_API_KEY=${GEMINI_API_KEY:-}'
      - 'OBSIDIAN_VAULT_PATH=/opt/data/vault'
      - 'NITRO_HOST=0.0.0.0'
      - 'NITRO_PORT=3000'
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /opt/data/vault /opt/data/war-room
        if [ ! -f /opt/data/war-room/.output/server/index.mjs ]; then
          echo "[warroom] downloading release..."
          cd /opt/data/war-room
          curl -fsSL -o wr.tar.gz https://github.com/Naroh091/hermes-war-room/releases/latest/download/hermes-war-room.tar.gz
          tar xzf wr.tar.gz && rm -f wr.tar.gz
        fi
        echo "[warroom] ensuring profiles..."
        hermes profile create lider --clone 2>/dev/null || true
        hermes profile create chercheur --clone 2>/dev/null || true
        hermes profile create redacteur --clone 2>/dev/null || true
        echo "[warroom] starting kanban dispatcher..."
        hermes kanban daemon --force --interval 60 &
        echo "[warroom] starting war-room server on 0.0.0.0:3000..."
        cd /opt/data/war-room
        exec node .output/server/index.mjs
    expose:
      - '3000'
    labels:
      - 'traefik.http.middlewares.warroomauth.basicauth.users=admin:$$$$apr1$$$$XRfTR85L$$$$LHsezJgJ5aPjtpCIjMupP1'
      - 'traefik.http.routers.https-0-vcowya4fd5ybas2cxr9pnwtq-warroom.middlewares=gzip,warroomauth'
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 150s

volumes:
  hermes_backups:
