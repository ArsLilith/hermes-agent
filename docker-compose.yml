services:
  dashboard:
    build: .
    image: hermes-agent
    container_name: hermes-dashboard
    restart: unless-stopped
    volumes:
      - '~/.hermes:/opt/data'
      - 'hermes_backups:/backups'
    environment:
      - 'HERMES_UID=${HERMES_UID:-0}'
      - 'HERMES_GID=${HERMES_GID:-0}'
      - 'OPENROUTER_API_KEY=${OPENROUTER_API_KEY}'
      - 'HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME}'
      - 'HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH}'
      - 'HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASHBOARD_BASIC_AUTH_SECRET}'
      # Optional tool keys (empty by default — set in Coolify to enable)
      - 'EXA_API_KEY=${EXA_API_KEY:-}'
      - 'FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}'
      - 'FAL_KEY=${FAL_KEY:-}'
      - 'VOICE_TOOLS_OPENAI_KEY=${VOICE_TOOLS_OPENAI_KEY:-}'
    command: [dashboard, '--host', '0.0.0.0', '--no-open']
    expose:
      - '9119'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9119/api/status', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  hermes_backups:
